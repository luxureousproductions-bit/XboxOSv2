<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ab0e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a6ea8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c87010;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- R letter -->
  <text x="4" y="48" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="52" fill="url(#rGrad)">R</text>
  <!-- A letter -->
  <text x="28" y="48" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="52" fill="url(#aGrad)">A</text>
</svg>
